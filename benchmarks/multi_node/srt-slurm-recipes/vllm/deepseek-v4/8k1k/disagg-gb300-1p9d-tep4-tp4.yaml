name: "svf-vllm-disagg-gb300-1p9d-tep4-tp4"

# Topology: 1 prefill (TEP=4) + 9 decode (TP=4). 10 GB300 nodes (1P + 9D = 40
# GPUs at 4 GPUs/node), NATS/etcd colocated on the prefill node.
# Wide-decode point at concurrency 18 — each decode worker holds a
# single replica.
model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:dsv4-megamoe-mxfp4-arm64-cu130-4ba0a72"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 9
  prefill_workers: 1
  decode_workers: 9
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null
  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 256
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.9
      enable-ep-weight-filter: true
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      max-model-len: 16384
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 512
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      all2all-backend: "flashinfer_nvlink_one_sided"
      no-enable-flashinfer-autotune: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "18"
  req_rate: "inf"
  tokenizer_mode: "deepseek_v4"
  use_chat_template: true
