name: "minimax-m3-vllm-disagg-b300-1p2d-fp8-dep2-dep4-1k1k"

model:
  path: "MiniMaxAI/MiniMax-M3-MXFP8"
  container: "vllm/vllm-openai:minimax-m3-0618-x86_64-cu130"
  precision: "fp8"

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 2
  gpus_per_prefill: 2
  gpus_per_decode: 4

dynamo:
  install: true
  version: 1.3.0.dev20260614

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    UCX_TLS: "cuda_copy,rc"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  decode_environment:
    UCX_TLS: "cuda_copy,rc"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"

  vllm_config:
    prefill:
      tensor-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048

    decode:
      tensor-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-num-seqs: 1024
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 8192

health_check:
  max_attempts: 360
  interval_seconds: 10

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "2048"
  req_rate: "inf"
