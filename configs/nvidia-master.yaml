dsr1-fp8-h200-dynamo-sglang:
  image: lmsysorg/sglang:v0.5.8.post1-cu130
  model: deepseek-ai/DeepSeek-R1-0528
  model-prefix: dsr1
  runner: h200-multinode
  precision: fp8
  framework: dynamo-sglang
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      # STP: Low latency (1 prefill, 9 decode, TEP)
      - spec-decoding: "none"
        conc-list: [1, 4, 8, 16, 32, 64, 128, 256]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/low-latency-1p9d.yaml"
        decode:
          num-worker: 9
          tp: 8
          ep: 1
          dp-attn: false
      # STP: High throughput TEP (1 prefill, 6 decode)
      - spec-decoding: "none"
        conc-list: [512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-tp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 1
          dp-attn: false
      # STP: High throughput DEP (1 prefill, 6 decode, dp-attention)
      - spec-decoding: "none"
        conc-list: [128, 256, 512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-dep.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 8
          dp-attn: true
      # MTP: Low latency (1 prefill, 9 decode, TEP)
      - spec-decoding: "mtp"
        conc-list: [1, 4, 8, 16, 32, 64, 128, 256]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/low-latency-1p9d-mtp.yaml"
        decode:
          num-worker: 9
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: High throughput TEP (1 prefill, 6 decode)
      - spec-decoding: "mtp"
        conc-list: [512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-tp-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: High throughput DEP (1 prefill, 6 decode, dp-attention)
      - spec-decoding: "mtp"
        conc-list: [128, 256, 512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-dep-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 8
          dp-attn: true
    - isl: 8192
      osl: 1024
      search-space:
      # STP: Low latency TEP (1 prefill, 7 decode)
      - spec-decoding: "none"
        conc-list: [1, 4, 8]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs4-1p7d.yaml"
        decode:
          num-worker: 7
          tp: 8
          ep: 1
          dp-attn: false
      # STP: TEP (1 prefill, 6 decode)
      - spec-decoding: "none"
        conc-list: [4, 8, 16]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs8-1p6d.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 1
          dp-attn: false
      # STP: TEP (1 prefill, 3 decode)
      - spec-decoding: "none"
        conc-list: [8, 16, 32]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs16-1p3d.yaml"
        decode:
          num-worker: 3
          tp: 8
          ep: 1
          dp-attn: false
      # STP: TEP (2 prefill, 3 decode)
