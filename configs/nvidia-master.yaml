          tp: 8
          ep: 8
          dp-attn: false

      # 2p3d DEP2+DEP4, 4n: conc 8192
      - conc-list: [8192]
        prefill:
          num-worker: 2
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/1k1k/2p3d-dep2-dep4-1k1k.yaml"
        decode:
          num-worker: 3
          tp: 4
          ep: 4
          dp-attn: true

      # 2p4d DEP2+DEP4, 5n: conc 8192
      - conc-list: [8192]
        prefill:
          num-worker: 2
          tp: 2
          ep: 2
          dp-attn: true
