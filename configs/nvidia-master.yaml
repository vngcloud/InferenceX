        conc-list: [2, 4, 8, 16, 32]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs8-1p6d-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: TEP (1 prefill, 3 decode)
      - spec-decoding: "mtp"
        conc-list: [4, 8, 16, 32, 64]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs16-1p3d-mtp.yaml"
        decode:
          num-worker: 3
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: TEP (2 prefill, 3 decode)
