  model: openai/gpt-oss-120b
  model-prefix: gptoss
  runner: gb200
  precision: fp4
  framework: dynamo-trt
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      #Right of pareto
      #P: 1xTP1   D:1xTP4
      - spec-decoding: "none"
        conc-list: [ 1, 2, 4, 16, 32, 64, 128 ]
        prefill:
          num-worker: 1
          tp: 1
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "PREFILL_MAX_NUM_TOKENS=20000"
          - "PREFILL_MAX_BATCH_SIZE=32"
        decode:
          num-worker: 1
          tp: 4
          ep: 1
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=1"
          - "DECODE_MAX_NUM_TOKENS=20000"
          - "DECODE_MAX_BATCH_SIZE=256"
          - "DECODE_GPU_MEM_FRACTION=0.9"

  # P: 1xTP1   D:4xTP2
      - spec-decoding: "none"
        conc-list: [ 16 ]
        prefill:
          num-worker: 1
          tp: 1
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "PREFILL_MAX_NUM_TOKENS=20000"
          - "PREFILL_MAX_BATCH_SIZE=32"
        decode:
          num-worker: 4
          tp: 2
          ep: 1
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=2"
          - "DECODE_MAX_NUM_TOKENS=20000"
          - "DECODE_MAX_BATCH_SIZE=32"
