  model: nvidia/GLM-5-NVFP4
  model-prefix: glm5
  runner: gb300-nv
  precision: fp4
  framework: dynamo-trt
  router: { name: dynamo-router, version: "v1.3.0-dev.1" }
  kv-p2p-transfer: nixl
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      # MTP configurations
      - spec-decoding: "mtp"
