        decode:
          num-worker: 4
          tp: 4
          ep: 4
          dp-attn: true

      # 4p2d DEP2+DEP8, 6n: conc 1024,4096
      - conc-list: [1024, 4096]
        prefill:
          num-worker: 4
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/1k1k/4p2d-dep2-dep8-1k1k.yaml"
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: true

    - isl: 8192
