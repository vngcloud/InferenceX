      osl: 1024
      search-space:
      - { tp: 4, conc-start: 1, conc-end: 64 }
      - { tp: 8, conc-start: 1, conc-end: 4 }
      - { tp: 4, ep: 4, dp-attn: true, conc-start: 256, conc-end: 512 }
