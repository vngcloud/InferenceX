        conc-list: [128, 256, 512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-dep-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 8
          dp-attn: true
