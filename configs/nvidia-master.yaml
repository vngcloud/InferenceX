        decode:
          num-worker: 9
          tp: 8
          ep: 1
          dp-attn: false
      # STP: High throughput TEP (1 prefill, 6 decode)
      - spec-decoding: "none"
        conc-list: [512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
