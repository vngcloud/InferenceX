        conc-list: [1024]
        prefill:
          num-worker: 3
          tp: 4
          ep: 4
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/sglang/dsr1/b200-fp4/8k1k/disagg/mtp/8k1k_mtp2_throughput_3p1d.yaml"
        decode:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
