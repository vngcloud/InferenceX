name: Template - Multi-Node Benchmark

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      model:
        required: true
        type: string
      model-prefix:
        required: true
        type: string
      framework:
        required: true
        type: string
      precision:
        required: true
        type: string
      exp-name:
        required: true
        type: string
      isl:
        required: true
        type: string
      osl:
        required: true
        type: string
      conc-list:
        required: true
        type: string
      spec-decoding:
        required: true
        type: string
      disagg:
        required: true
        type: string
      prefill-hardware:
        description: "GPU SKU used by prefill workers"
        required: false
        type: string
        default: ""
      decode-hardware:
        description: "GPU SKU used by decode workers"
        required: false
        type: string
        default: ""

      max-model-len:
        required: true
        type: string

      prefill-num-worker:
        required: true
        type: string
      prefill-tp:
        required: true
        type: string
      prefill-pp:
        required: false
        type: string
        default: '1'
      prefill-dcp-size:
        required: false
        type: string
        default: '1'
      prefill-pcp-size:
        required: false
        type: string
        default: '1'
      prefill-ep:
        required: true
        type: string
      prefill-dp-attn:
        required: true
        type: string
      prefill-additional-settings:
        required: false
        type: string
        default: "[]"

      decode-num-worker:
        required: true
        type: string
      decode-tp:
        required: true
        type: string
      decode-pp:
        required: false
        type: string
        default: '1'
      decode-dcp-size:
        required: false
        type: string
        default: '1'
      decode-pcp-size:
        required: false
        type: string
        default: '1'
      decode-ep:
        required: true
        type: string
      decode-dp-attn:
        required: true
        type: string
      decode-additional-settings:
        required: false
        type: string
        default: "[]"
      run-eval:
        type: boolean
        required: false
        default: false
      eval-only:
        description: "Run only evals (skip throughput benchmark)"
        type: boolean
        required: false
        default: false
      eval-conc:
        description: "Concurrency value or space-separated list for eval requests (overrides default max-of-conc-list)"
        type: string
        required: false
        default: ""
      # Agentic-coding inputs. Fixed-seq-len jobs leave these empty.
      scenario-type:
        description: "Scenario type (fixed-seq-len or agentic-coding)"
        type: string
        required: false
        default: fixed-seq-len
      conc:
        description: "First concurrency for agentic-coding scenarios; CONC_LIST carries the full batch"
        type: string
        required: false
        default: ""
      duration:
        description: "Agentic trace replay duration in seconds"
        type: string
        required: false
        default: "3600"
      kv-offloading:
        description: "KV offload mode for agentic scenarios (none/dram)"
        required: false
        type: string
      kv-offload-backend:
        description: "KV offload backend for agentic scenarios when kv-offloading is not none"
        required: false
        type: string
      total-cpu-dram-gb:
        description: "Total CPU DRAM in GB for KV offloading"
        required: false
        type: string
        default: '600'
      ref:
        description: "Git ref (branch/sha) to checkout"
        required: false
        type: string

env:
  RANDOM_RANGE_RATIO: 0.8
  # Day-zero models resolved via hf: ids download from the Hub inside the
  # slurm job (srtctl pre-download + dynamo hub fetch). Anonymous requests
  # get 429-rate-limited when several workers pull a 444 GB snapshot at
  # once; sbatch/srun inherit this env so the token reaches the workers.
  HF_TOKEN: ${{ secrets.INFERENCEX_OFFICIAL_RO_HF_TOKEN }}
  EXP_NAME: ${{ inputs.exp-name }}
  IMAGE: ${{ inputs.image }}
  MODEL_PREFIX: ${{ inputs.model-prefix }}
  MODEL: ${{ inputs.model }}
  FRAMEWORK: ${{ inputs.framework }}
  PRECISION: ${{ inputs.precision }}
  ISL: ${{ inputs.isl }}
  OSL: ${{ inputs.osl }}
  MAX_MODEL_LEN: ${{ inputs.max-model-len }}
  CONC_LIST: ${{ join(fromJson(inputs.conc-list), ' ') }}
  SPEC_DECODING: ${{ inputs.spec-decoding }}
  DISAGG: ${{ inputs.disagg }}
  PREFILL_HARDWARE: ${{ inputs.prefill-hardware }}
  DECODE_HARDWARE: ${{ inputs.decode-hardware }}
  RUN_EVAL: ${{ inputs.run-eval }}
  EVAL_ONLY: ${{ inputs.eval-only }}
  EVAL_CONC: ${{ inputs.eval-conc }}
  # Agentic-coding env. Fixed-seq-len jobs leave these empty.
  SCENARIO_TYPE: ${{ inputs.scenario-type }}
  SCENARIO_SUBDIR: ${{ inputs.scenario-type == 'agentic-coding' && 'agentic/' || 'fixed_seq_len/' }}
  IS_AGENTIC: ${{ inputs.scenario-type == 'agentic-coding' && '1' || '0' }}
  CONC: ${{ inputs.conc }}
  DURATION: ${{ inputs.duration }}
  KV_OFFLOADING: ${{ inputs.kv-offloading }}
  KV_OFFLOAD_BACKEND: ${{ inputs.kv-offload-backend }}
  TOTAL_CPU_DRAM_GB: ${{ inputs.total-cpu-dram-gb }}
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONPYCACHEPREFIX: /tmp/inferencex-pycache

  PREFILL_NUM_WORKERS: ${{ inputs.prefill-num-worker }}
  PREFILL_TP: ${{ inputs.prefill-tp }}
  PREFILL_PP_SIZE: ${{ inputs.prefill-pp }}
  PREFILL_DCP_SIZE: ${{ inputs.prefill-dcp-size }}
  PREFILL_PCP_SIZE: ${{ inputs.prefill-pcp-size }}
  PREFILL_EP: ${{ inputs.prefill-ep }}
  PREFILL_DP_ATTN: ${{ inputs.prefill-dp-attn }}

  DECODE_NUM_WORKERS: ${{ inputs.decode-num-worker }}
  DECODE_TP: ${{ inputs.decode-tp }}
  DECODE_PP_SIZE: ${{ inputs.decode-pp }}
  DECODE_DCP_SIZE: ${{ inputs.decode-dcp-size }}
  DECODE_PCP_SIZE: ${{ inputs.decode-pcp-size }}
  DECODE_EP: ${{ inputs.decode-ep }}
  DECODE_DP_ATTN: ${{ inputs.decode-dp-attn }}

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 480
    name: >-
      ${{ inputs.model-prefix }} ${{ inputs.precision }} ${{ inputs.runner }} ${{ inputs.framework == 'sglang' && 'sgl' || inputs.framework == 'dynamo-sglang' && 'dyn-sgl' || inputs.framework == 'sglang-disagg' && 'sgl-disagg' || inputs.framework }}
      ${{ inputs.prefill-num-worker }}P (TP${{ inputs.prefill-tp }}${{ inputs.prefill-pp != '' && inputs.prefill-pp != '1' && format('/PP{0}', inputs.prefill-pp) || '' }}${{ inputs.prefill-dcp-size != '' && inputs.prefill-dcp-size != '1' && format('/DCP{0}', inputs.prefill-dcp-size) || '' }}${{ inputs.prefill-pcp-size != '' && inputs.prefill-pcp-size != '1' && format('/PCP{0}', inputs.prefill-pcp-size) || '' }}${{ inputs.prefill-ep != '' && inputs.prefill-ep != '1' && format('/EP{0}', inputs.prefill-ep) || '' }}${{ inputs.prefill-dp-attn == 'true' && '/DPA' || '' }})
      x ${{ inputs.decode-num-worker }}D (TP${{ inputs.decode-tp }}${{ inputs.decode-pp != '' && inputs.decode-pp != '1' && format('/PP{0}', inputs.decode-pp) || '' }}${{ inputs.decode-dcp-size != '' && inputs.decode-dcp-size != '1' && format('/DCP{0}', inputs.decode-dcp-size) || '' }}${{ inputs.decode-pcp-size != '' && inputs.decode-pcp-size != '1' && format('/PCP{0}', inputs.decode-pcp-size) || '' }}${{ inputs.decode-ep != '' && inputs.decode-ep != '1' && format('/EP{0}', inputs.decode-ep) || '' }}${{ inputs.decode-dp-attn == 'true' && '/DPA' || '' }})
      ${{ inputs.spec-decoding != 'none' && inputs.spec-decoding || '' }}
      ${{ inputs.kv-offloading != '' && inputs.kv-offloading != 'none' && format('{0} KV offload', inputs.kv-offloading) || '' }}
      ${{ inputs.kv-offload-backend != '' && inputs.kv-offload-backend != 'none' && inputs.kv-offload-backend != 'default' && inputs.kv-offload-backend || '' }}
      c${{ inputs.conc != '' && inputs.conc || join(fromJson(inputs.conc-list), 'x') }}${{ inputs.eval-only && ' | eval-only' || (inputs.run-eval && ' | eval' || '') }}

    steps:
      - name: Slurm cleanup (pre-run)
        run: &slurm-cleanup |
          if command -v squeue >/dev/null 2>&1; then
            echo "[Slurm] Cleaning up jobs named: ${{ runner.name }} ..."
            scancel --name="${{ runner.name }}" || true
            while [ -n "$(squeue --user="$USER" --name='${{ runner.name }}' --noheader --format='%i')" ]; do
              squeue --user="$USER" --name="${{ runner.name }}"
              sleep 5
            done
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
          clean: true
          submodules: true

      - name: Launch multi-node job script
        env:
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_TYPE: ${{ inputs.runner }}
          # Hash uniquely on all prefill/decode parallelism fields, worker counts, serving mode, concurrency, and runner.
          RESULT_FILENAME: ${{ env.EXP_NAME }}_${{ env.PRECISION }}_${{ env.FRAMEWORK }}_prefill-tp${{ env.PREFILL_TP }}-pp${{ env.PREFILL_PP_SIZE }}-dcp${{ env.PREFILL_DCP_SIZE }}-pcp${{ env.PREFILL_PCP_SIZE }}-ep${{ env.PREFILL_EP }}-dp${{ env.PREFILL_DP_ATTN }}-nw${{ env.PREFILL_NUM_WORKERS }}_decode-tp${{ env.DECODE_TP }}-pp${{ env.DECODE_PP_SIZE }}-dcp${{ env.DECODE_DCP_SIZE }}-pcp${{ env.DECODE_PCP_SIZE }}-ep${{ env.DECODE_EP }}-dp${{ env.DECODE_DP_ATTN }}-nw${{ env.DECODE_NUM_WORKERS }}_disagg-${{ env.DISAGG }}_spec-${{ env.SPEC_DECODING }}_conc${{ join(fromJson(inputs.conc-list), 'x') }}_${{ runner.name }}
        run: |
          set -x
          # Export RESULT_FILENAME early so it's available for artifact uploads even if cancelled
          echo "RESULT_FILENAME=${RESULT_FILENAME}" >> "$GITHUB_ENV"

          export ${{ join(fromJson(inputs.prefill-additional-settings), ' ') }} ${{ join(fromJson(inputs.decode-additional-settings), ' ') }}
          export IS_MULTINODE=true
          bash ./runners/launch_${RUNNER_NAME%%_*}.sh
          if [ "${{ inputs.eval-only }}" = "true" ]; then
            echo "Eval-only mode: skipping benchmark result file check"
            # Verify eval produced results
            if ! ls results*.json 1>/dev/null 2>&1; then
              echo "Eval-only run failed: no results*.json files found." >&2
              exit 1
            fi
          elif [ "${{ inputs.scenario-type }}" = "agentic-coding" ]; then
            expected_count=$(wc -w <<< "$CONC_LIST" | tr -d ' ')
            shopt -s nullglob
            agentic_results=("${RESULT_FILENAME}"_conc*.json)
            shopt -u nullglob
            if [ "${#agentic_results[@]}" -ne "$expected_count" ]; then
              echo "Run failed: expected $expected_count agentic results, found ${#agentic_results[@]}." >&2
              exit 1
            fi
            # Existence is not enough: the agentic aggregation step writes the
            # aggregate even when aiperf recorded zero valid requests. Require
            # successful requests in every concurrency result.
            for result_file in "${agentic_results[@]}"; do
              echo "Found agentic result file: $result_file"
              ok=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(int(bool(d.get('num_requests_successful'))))" "$result_file" 2>/dev/null || echo 0)
              if [ "$ok" != "1" ]; then
                echo "Run failed: $result_file has zero successful requests." >&2
                exit 1
              fi
            done
          else
            # Check if at least one result file was created
            if ls ${RESULT_FILENAME}_*.json 1> /dev/null 2>&1; then
              echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV
              echo "Found result files: $(ls ${RESULT_FILENAME}_*.json)"
            else
              echo "Run failed: No benchmark result files found for ${RESULT_FILENAME}_*.json" >&2
              exit 1
            fi
          fi

      - name: Process result
        if: ${{ !inputs.eval-only && inputs.scenario-type != 'agentic-coding' }}
        env:
          RUNNER_TYPE: ${{ inputs.runner }}
        run: |
          # Process each result file
          for result_file in ${RESULT_FILENAME}_*.json; do
            if [ -f "$result_file" ]; then
              echo "Processing $result_file"
              # Extract GPU count, prefill_gpus and decode_gpus from filename for tp_size calculation
              gpus=$(echo "$result_file" | sed -n "s/.*_gpus_\([0-9][0-9]*\).*\.json/\1/p")
              prefill_gpus=$(echo "$result_file" | sed -n "s/.*_ctx_\([0-9]*\).*\.json/\1/p")
              decode_gpus=$(echo "$result_file" | sed -n "s/.*_gen_\([0-9]*\).*\.json/\1/p")

              if [ -n "$gpus" ]; then
                # Non-disagg results lack _ctx_/_gen_ fields; all GPUs belong to the single worker
                if [ -z "$prefill_gpus" ] || [ -z "$decode_gpus" ]; then
                  prefill_gpus=$gpus
                  decode_gpus=0
                fi
                echo "Extracted: gpus=$gpus, prefill_gpus=$prefill_gpus, decode_gpus=$decode_gpus"
                RESULT_FILENAME=${result_file%.json} IS_MULTINODE=true PREFILL_GPUS="$prefill_gpus" DECODE_GPUS="$decode_gpus" python3 utils/process_result.py
              fi
            fi
          done

      - name: Upload result
        if: ${{ !inputs.eval-only && inputs.scenario-type != 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bmk_${{ env.RESULT_FILENAME }}
          path: agg_${{ env.RESULT_FILENAME }}_*.json

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: multinode_server_logs_${{ env.RESULT_FILENAME }}
          # multinode launchers package server logs into this tarball.
          path: multinode_server_logs.tar.gz
          if-no-files-found: ignore

      - name: Upload agentic aggregated result
        if: ${{ !inputs.eval-only && inputs.scenario-type == 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bmk_agentic_${{ env.RESULT_FILENAME }}
          path: ${{ env.RESULT_FILENAME }}_conc*.json

      - name: Upload agentic raw results
        if: ${{ always() && inputs.scenario-type == 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agentic_${{ env.RESULT_FILENAME }}
          path: |
            LOGS/agentic/**
            !LOGS/agentic/**/aiperf_artifacts/inputs.json
            !LOGS/agentic/**/aiperf_artifacts/profile_export_raw.jsonl
          if-no-files-found: ignore

      - name: Upload eval results (if any)
        if: ${{ always() && (env.RUN_EVAL == 'true' || inputs.eval-only) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval_${{ env.EXP_NAME }}_${{ env.RESULT_FILENAME }}
          path: |
            meta_env.json
            results*.json
            sample*.jsonl
          if-no-files-found: ${{ inputs.eval-only && 'error' || 'ignore' }}

      - name: Verify eval scores
        if: ${{ (success() || failure()) && inputs.eval-only }}
        run: |
          expected_concs="${EVAL_CONC}"
          if [[ -z "${expected_concs}" ]]; then
            expected_concs="$(printf '%s\n' "${CONC_LIST}" | tr ' ' '\n' | sort -n | tail -1)"
          fi
          python3 utils/evals/validate_scores.py --expected-concs "${expected_concs}"

      - name: Cleanup eval outputs (post-upload)
        if: ${{ always() && (inputs.run-eval || inputs.eval-only) }}
        run: |
          rm -f meta_env.json || true
          rm -f results*.json || true
          rm -f sample*.jsonl || true

      - name: Slurm cleanup (post-run)
        if: always()
        run: *slurm-cleanup
