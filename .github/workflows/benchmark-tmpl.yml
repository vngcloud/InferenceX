name: Template - Benchmark
on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      model:
        required: true
        type: string
      model-prefix:
        required: true
        type: string
      precision:
        required: true
        type: string
      framework:
        required: true
        type: string
      exp-name:
        required: true
        type: string
      isl:
        required: true
        type: string
      osl:
        required: true
        type: string
      tp:
        required: true
        type: string
      pp:
        required: false
        type: string
        default: '1'
      dcp-size:
        required: false
        type: string
        default: '1'
      pcp-size:
        required: false
        type: string
        default: '1'

      ep:
        required: true
        type: string
      dp-attn:
        required: true
        type: boolean
      max-model-len:
        required: true
        type: string
      conc:
        required: true
        type: string
      spec-decoding:
        required: true
        type: string
      disagg:
        required: true
        type: string
      run-eval:
        type: boolean
        required: true
        default: false
      eval-only:
        description: "Run only evals (skip throughput benchmark)"
        type: boolean
        required: false
        default: false
      random-range-ratio:
        required: false
        type: string
        default: '0.8'
      ref:
        description: "Git ref (branch/sha) to checkout"
        required: false
        type: string
      # Agentic-coding inputs. Fixed-seq-len jobs leave these empty.
      scenario-type:
        description: "Scenario type (fixed-seq-len or agentic-coding)"
        required: false
        type: string
        default: 'fixed-seq-len'
      kv-offloading:
        description: "KV offload mode for agentic scenarios (none/dram)"
        required: false
        type: string
      kv-offload-backend:
        description: "KV offload backend for agentic scenarios when kv-offloading is not none"
        required: false
        type: string
      kv-offload-backend-metadata:
        description: "Optional KV offload backend name and version metadata as JSON"
        required: false
        type: string
      router:
        description: "Optional router name and version metadata as JSON"
        required: false
        type: string
      kv-p2p-transfer:
        description: "Optional multinode peer-to-peer KV transfer engine name"
        required: false
        type: string
      total-cpu-dram-gb:
        description: "Configured CPU DRAM capacity in GB for KV offloading"
        required: false
        type: string
        default: '0'
      duration:
        description: "Benchmark duration in seconds"
        required: false
        type: string
        default: '3600'
      eval-limit:
        description: "Eval instance count: empty/full = whole split (default); N = first-N smoke slice"
        required: false
        type: string
        default: ""
      swebench-gen-mode:
        description: "SWE-bench generation mode (single-shot | agentic). Empty = agentic (single-shot is an explicit debugging escape hatch)."
        required: false
        type: string
        default: ""
      # Remote-bench inputs. Only consumed by *-remote-bench.sh recipes
      # (runner: cluster:remote-bench); every other recipe leaves these
      # empty and is unaffected.
      remote-base-url:
        description: "Base URL of an already-running, externally-managed inference endpoint to benchmark (remote-bench only)"
        required: false
        type: string
        default: ""
      remote-gpu-telemetry-url:
        description: "DCGM /metrics endpoint on the remote target (required for remote-bench)"
        required: false
        type: string
        default: ""
      remote-engine-metrics-url:
        description: "Inference engine /metrics endpoint on the remote target (required for remote-bench)"
        required: false
        type: string
        default: ""
      remote-reset-url:
        description: "Optional endpoint to reset KV/prefix cache + router affinity on the remote target before each concurrency point"
        required: false
        type: string
        default: ""
      remote-runner-type:
        description: "Real, GPU_KEYS-resolvable hardware string for the remote target (e.g. h200-nv). Required for remote-bench; overrides RUNNER_TYPE for artifact ingest since the runner label (cluster:remote-bench) isn't a real hardware key."
        required: false
        type: string
        default: ""
      remote-max-context-length:
        description: "Actual deployed context window of the remote target (required for remote-bench). Caps aiperf's replayed trace length; without it aiperf may replay traces longer than the remote model supports, which was confirmed via smoke test to trigger a silent 100%-GPU hang relying on server-side --allow-auto-truncate."
        required: false
        type: string
        default: ""
env:
  RANDOM_RANGE_RATIO: 0.8
  HF_TOKEN: ${{ secrets.INFERENCEX_OFFICIAL_RO_HF_TOKEN }}
  HF_HUB_CACHE: '/mnt/hf_hub_cache/'
  EXP_NAME: ${{ inputs.exp-name }}
  MODEL: ${{ inputs.model }}
  MODEL_PREFIX: ${{ inputs.model-prefix }}
  ISL: ${{ inputs.isl }}
  OSL: ${{ inputs.osl }}
  MAX_MODEL_LEN: ${{ inputs.max-model-len }}
  IMAGE: ${{ inputs.image }}
  FRAMEWORK: ${{ inputs.framework }}
  PRECISION: ${{ inputs.precision }}
  TP: ${{ inputs.tp }}
  PP_SIZE: ${{ inputs.pp }}
  DCP_SIZE: ${{ inputs.dcp-size }}
  PCP_SIZE: ${{ inputs.pcp-size }}
  EP_SIZE: ${{ inputs.ep }}
  DP_ATTENTION: ${{ inputs.dp-attn }}
  CONC: ${{ inputs.conc }}
  SPEC_DECODING: ${{ inputs.spec-decoding }}
  DISAGG: ${{ inputs.disagg }}
  RUN_EVAL: ${{ inputs.run-eval }}
  EVAL_ONLY: ${{ inputs.eval-only }}
  # Agentic-coding env. Fixed-seq-len jobs leave these empty.
  SCENARIO_TYPE: ${{ inputs.scenario-type }}
  SCENARIO_SUBDIR: ${{ inputs.scenario-type == 'agentic-coding' && 'agentic/' || 'fixed_seq_len/' }}
  IS_AGENTIC: ${{ inputs.scenario-type == 'agentic-coding' && '1' || '0' }}
  KV_OFFLOADING: ${{ inputs.kv-offloading }}
  KV_OFFLOAD_BACKEND: ${{ inputs.kv-offload-backend }}
  KV_OFFLOAD_BACKEND_METADATA: ${{ inputs.kv-offload-backend-metadata }}
  ROUTER_METADATA: ${{ inputs.router }}
  KV_P2P_TRANSFER: ${{ inputs.kv-p2p-transfer }}
  TOTAL_CPU_DRAM_GB: ${{ inputs.total-cpu-dram-gb }}
  DURATION: ${{ inputs.duration }}
  EVAL_LIMIT: ${{ inputs.eval-limit }}
  SWEBENCH_GEN_MODE: ${{ inputs.swebench-gen-mode }}
  # Remote-bench env. Only consumed by *-remote-bench.sh recipes.
  REMOTE_BASE_URL: ${{ inputs.remote-base-url }}
  REMOTE_GPU_TELEMETRY_URL: ${{ inputs.remote-gpu-telemetry-url }}
  REMOTE_ENGINE_METRICS_URL: ${{ inputs.remote-engine-metrics-url }}
  REMOTE_RESET_URL: ${{ inputs.remote-reset-url }}
  REMOTE_RUNNER_TYPE: ${{ inputs.remote-runner-type }}
  REMOTE_MAX_CONTEXT_LENGTH: ${{ inputs.remote-max-context-length }}
  AIPERF_FAILED_REQUEST_THRESHOLD: '0.10'
  RESULT_DIR: /workspace/results
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONPYCACHEPREFIX: /tmp/inferencex-pycache
  # GPU runners lack Docker for SWE-bench scoring.
  SWEBENCH_USE_MODAL: 'true'
  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
  # These b300 nodes are currently broken.
  SALLOC_EXCLUDE: 'b300-005,b300-006'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 500
    name: >-
      ${{ inputs.model-prefix }} ${{ inputs.precision }} ${{ inputs.runner }} ${{ inputs.framework == 'sglang' && 'sgl' || inputs.framework == 'dynamo-sglang' && 'dyn-sgl' || inputs.framework == 'sglang-disagg' && 'sgl-disagg' || inputs.framework }}
      TP${{ inputs.tp }}${{ inputs.pp != '' && inputs.pp != '1' && format('/PP{0}', inputs.pp) || '' }}${{ inputs.dcp-size != '' && inputs.dcp-size != '1' && format('/DCP{0}', inputs.dcp-size) || '' }}${{ inputs.pcp-size != '' && inputs.pcp-size != '1' && format('/PCP{0}', inputs.pcp-size) || '' }}${{ inputs.ep != '' && inputs.ep != '1' && format('/EP{0}', inputs.ep) || '' }}${{ inputs.dp-attn && '/DPA' || '' }}
      ${{ inputs.spec-decoding != 'none' && inputs.spec-decoding || '' }}
      ${{ inputs.kv-offloading != '' && inputs.kv-offloading != 'none' && format('{0} KV offload', inputs.kv-offloading) || '' }}
      ${{ inputs.kv-offload-backend != '' && inputs.kv-offload-backend != 'none' && inputs.kv-offload-backend != 'default' && inputs.kv-offload-backend || '' }}
      c${{ inputs.conc }}${{ inputs.eval-only && ' | eval-only' || (inputs.run-eval && ' | eval' || '') }}
    steps:
      - name: Resource cleanup (pre-run)
        run: &resource-cleanup |
          # Cleanup Docker resources
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "[Docker] Cleaning up resources ..."
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi

          # Cleanup SLURM resources
          if command -v squeue >/dev/null 2>&1; then
            echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
            scancel --name="${{ runner.name }}" || true
            while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
              squeue --name="${{ runner.name }}"
              sleep 5
            done
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
          clean: true
          submodules: true

      - name: Launch job script
        env:
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_TYPE: ${{ inputs.runner }}
          # Hash uniquely on {EXP_NAME}_{PRECISION}_{FRAMEWORK}_tp{}-pp{}-dcp{}-pcp{}-ep{}-dpa{}_disagg-{}_spec-{}_conc{}_{runner}
          RESULT_FILENAME: ${{ env.EXP_NAME }}_${{ env.PRECISION }}_${{ env.FRAMEWORK }}_tp${{ env.TP }}-pp${{ env.PP_SIZE }}-dcp${{ env.DCP_SIZE }}-pcp${{ env.PCP_SIZE }}-ep${{ env.EP_SIZE }}-dpa${{ env.DP_ATTENTION }}_disagg-${{ env.DISAGG }}_spec-${{ env.SPEC_DECODING }}_conc${{ env.CONC }}_${{ runner.name }}
          # Suppress per-job eval markdown from being appended to the step summary.
          # We'll publish a single combined eval table in the collection job instead.
          GITHUB_STEP_SUMMARY: ''
        run: |
          export GPU_COUNT=$((TP * PP_SIZE * PCP_SIZE))
          echo "GPU_COUNT=${GPU_COUNT}" >> "$GITHUB_ENV"

          # Export RESULT_FILENAME early so it's available for artifact uploads even if cancelled
          echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV

          bash ./runners/launch_${RUNNER_NAME%%_*}.sh

          if [ "${{ inputs.eval-only }}" = "true" ]; then
            echo "Eval-only mode: skipping benchmark result file check"
            # Verify eval produced results
            if ! ls results*.json 1>/dev/null 2>&1; then
              echo "Eval-only run failed: no results*.json files found." >&2
              exit 1
            fi
          else
            FOUND_RESULT_FILE=
            for i in {1..10}; do
              if [ -f "$RESULT_FILENAME.json" ]; then
                FOUND_RESULT_FILE=true
                break
              fi
              echo "Waiting for result file... (attempt $i)"
              sleep 1
            done

            if [ -z "$FOUND_RESULT_FILE" ]; then
              echo "Run failed: Benchmark result $RESULT_FILENAME.json not found." >&2
              exit 1
            fi

            if [ "${{ inputs.scenario-type }}" = "agentic-coding" ]; then
              python3 -m utils.agentic.validation.validate_agentic_result \
                results/aiperf_artifacts \
                --failed-request-threshold "$AIPERF_FAILED_REQUEST_THRESHOLD"
            fi
          fi

      - name: Process result
        if: ${{ !inputs.eval-only && inputs.scenario-type != 'agentic-coding' }}
        env:
          RUNNER_TYPE: ${{ inputs.runner }}
        run: |
          python3 utils/process_result.py

      - name: Upload result
        if: ${{ !inputs.eval-only && inputs.scenario-type != 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bmk_${{ env.RESULT_FILENAME }}
          path: agg_${{ env.RESULT_FILENAME }}.json

      - name: Upload agentic aggregated result
        if: ${{ always() && inputs.scenario-type == 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bmk_agentic_${{ env.RESULT_FILENAME }}
          path: ${{ env.RESULT_FILENAME }}.json

      - name: Upload agentic raw results
        if: ${{ always() && inputs.scenario-type == 'agentic-coding' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agentic_${{ env.RESULT_FILENAME }}
          path: |
            results/**
            !results/aiperf_artifacts/inputs.json
            !results/aiperf_artifacts/profile_export_raw.jsonl
          if-no-files-found: ignore

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.eval-only && 'eval_server_logs_' || 'server_logs_' }}${{ env.RESULT_FILENAME }}
          # fixed-seq writes server.log at root; agentic writes logs under results/.
          path: |
            server.log
            results/*.log
            results/*_config.json
          if-no-files-found: ignore

      - name: Upload GPU metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.eval-only && 'eval_gpu_metrics_' || 'gpu_metrics_' }}${{ env.RESULT_FILENAME }}
          path: gpu_metrics.csv
          if-no-files-found: ignore

      - name: Upload eval results (if any)
        if: ${{ always() && (env.RUN_EVAL == 'true' || inputs.eval-only) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval_${{ env.EXP_NAME }}_${{ env.RESULT_FILENAME }}
          path: |
            meta_env.json
            results*.json
            sample*.jsonl
            agent_preds.json
            predictions.jsonl
            swebench_report_*.json
            *.traj*
          if-no-files-found: ${{ inputs.eval-only && 'error' || 'ignore' }}

      - name: Verify eval scores
        if: ${{ (success() || failure()) && inputs.eval-only }}
        run: python3 utils/evals/validate_scores.py

      - name: Cleanup eval outputs (post-upload)
        if: ${{ always() && (env.RUN_EVAL == 'true' || inputs.eval-only) }}
        run: |
          rm -f meta_env.json || true
          # Remove any eval results JSONs that were moved into workspace
          rm -f results*.json || true
          rm -f sample*.jsonl || true
          rm -f agent_preds.json predictions.jsonl swebench_report_*.json *.traj* || true
          
      - name: Resource cleanup (post-run)
        if: always()
        run: *resource-cleanup
