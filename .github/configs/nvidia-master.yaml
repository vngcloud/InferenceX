      osl: 1024
      search-space:
      - { tp: 1, conc-start:   4, conc-end: 256}
      - { tp: 2, conc-start:   4, conc-end: 256}
      - { tp: 4, conc-start:   4, conc-end:  32}
      - { tp: 8, conc-start:   4, conc-end:   4}

