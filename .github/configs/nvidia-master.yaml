  model-prefix: dsr1
  runner: h200-multinode
  precision: fp8
  framework: dynamo-sglang
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      # STP: Low latency (1 prefill, 9 decode, TEP)
      - spec-decoding: "none"
        conc-list: [1, 4, 8, 16, 32, 64, 128, 256]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
