      #   decode:
      #     num-worker: 1
      #     tp: 16
      #     ep: 16
      #     dp-attn: true
      # MTP: Max throughput TEP (1 prefill, 1 decode)
      - spec-decoding: "mtp"
        conc-list: [1, 2, 4, 8, 16, 32, 64, 128]
        prefill:
          num-worker: 1
