        conc-list: [8, 16, 32]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs16-1p3d.yaml"
        decode:
          num-worker: 3
          tp: 8
          ep: 1
          dp-attn: false
      # STP: TEP (2 prefill, 3 decode)
