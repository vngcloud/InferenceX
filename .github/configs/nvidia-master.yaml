        prefill:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/8k1k/disagg-gb200-high-tpt-megamoe.yaml"
        decode:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true

      # MegaMOE max throughput: 3 prefill (DEP=8 each) + 1 decode (DEP=8).
