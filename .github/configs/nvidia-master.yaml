        decode:
          num-worker: 9
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: High throughput TEP (1 prefill, 6 decode)
      - spec-decoding: "mtp"
        conc-list: [512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-tp-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 1
          dp-attn: false
      # MTP: High throughput DEP (1 prefill, 6 decode, dp-attention)
      - spec-decoding: "mtp"
        conc-list: [128, 256, 512, 1024, 2048]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/h200/1k1k/bs256-1p6d-dep-mtp.yaml"
        decode:
          num-worker: 6
          tp: 8
          ep: 8
          dp-attn: true
    - isl: 8192
      osl: 1024
      search-space:
      # STP: Low latency TEP (1 prefill, 7 decode)
      - spec-decoding: "none"
        conc-list: [1, 4, 8]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h200/8k1k/bs4-1p7d.yaml"
        decode:
          num-worker: 7
          tp: 8
          ep: 1
          dp-attn: false
      # STP: TEP (1 prefill, 6 decode)
