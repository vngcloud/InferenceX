        conc-list: [1, 2, 4, 8, 16, 32, 64, 128]
        prefill:
          num-worker: 1
          tp: 16
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h100/1k1k/mtp/h100-fp8-1p2d-max-tp-mtp.yaml"
