          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/h100/1k1k/mtp/h100-fp8-1p1d-max-dep-mtp.yaml"
        decode:
          num-worker: 1
          tp: 16
          ep: 16
          dp-attn: true
    - isl: 8192
