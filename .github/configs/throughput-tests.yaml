# Standalone throughput-test matrix. See design/throughput-test.md for the
# full design. Separate from smoke-tests.yaml / .github/workflows/
# smoke-test.yml -- throughput is a heavier check against a shared
# production endpoint, with its own cadence/dataset/schema, not a quick
# correctness gate.
#
# Unlike smoke-tests.yaml, a stack with no entry here is skipped entirely --
# throughput testing is opt-in per stack, not run by default against every
# discovered stack.
#
# Fields:
#   dataset: (optional) aiperf --public-dataset name. Defaults to
#     semianalysis_cc_traces_weka -- real Claude Code coding-session traces
#     (949 traces, 136k requests), public HF dataset, no auth required,
#     prompt text synthesized from a coding corpus against preserved
#     per-request hash_ids/timing. Richer signal than a flat synthetic
#     isl/osl sweep.
#   num-dataset-entries: (optional) how many trace rows to load, default 100.
#     Raise (up to 949 for the full corpus) for a fuller run, at the cost of
#     a slower sweep.
#
#     IMPORTANT, learned 2026-07-13: aiperf's semianalysis_cc_traces_weka
#     loader appears to reconstruct/tokenize the FULL 949-trace corpus before
#     subsetting down to this value -- memory scales with the full corpus
#     size, not (only) with num-dataset-entries or --max-workers. At the old
#     default of 100 with conc-list up to 32, this OOM-killed our
#     self-hosted benchmark-client runner's systemd service outright (host
#     was 31GB RAM / 16 cores, process grew to ~31.6GB RSS), twice, on two
#     separate runner registrations on the same physical box. Deliberately
#     lowered here to reduce that risk on future automatic
#     (repository_dispatch: stack-deployed) runs -- this is a conservative
#     stopgap, not a fix for the underlying memory scaling, and may still
#     produce sparse-to-empty per-point stats at low concurrency (AIPerf
#     omits metric blocks it can't compute rather than erroring, see
#     aiperf_adapter.py's build_result()). See design/throughput-test.md and
#     project_throughput_test_standalone.md (session memory) for the full
#     investigation.
#   conc-list: concurrency levels to sweep, sequentially -- these share one
#     live deployment's capacity, so concurrent runs would contaminate each
#     other's numbers.
#   benchmark-duration-s: seconds per concurrency level.

sglang-vanilla:
  conc-list: [1, 8, 16]
  benchmark-duration-s: 30
  num-dataset-entries: 20

sglang-mooncake-store:
  conc-list: [1, 8, 16]
  benchmark-duration-s: 30
  num-dataset-entries: 20

sglang-pd-disaggregation:
  conc-list: [1, 8, 16]
  benchmark-duration-s: 30
  num-dataset-entries: 20
